<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Login — StockPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00E5A0; --bg-primary: #0A0E1A; --bg-card: #111827; --bg-elevated: #1a2236; --text-primary: #F0F4FF; --text-muted: #6B7A9E; --border: #1E2D45; --danger: #FF4D6A; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        h1,h2 { font-family: 'Syne', sans-serif; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; }
        .input-field { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); border-radius: 12px; width: 100%; padding: 14px 16px; font-size: 16px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
        .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.1); }
        .input-field::placeholder { color: var(--text-muted); }
        .btn-primary { background: var(--accent); color: #0A0E1A; font-family: 'Syne', sans-serif; font-weight: 700; border-radius: 14px; padding: 16px; width: 100%; font-size: 16px; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .toast-error { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3); color: #FF4D6A; padding: 12px 16px; border-radius: 12px; font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); box-shadow: 0 0 40px rgba(0,229,160,0.15);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <h1 class="text-3xl font-bold">StockPulse</h1>
            <p class="text-sm mt-1" style="color: var(--text-muted);">Multi-Shop Inventory System</p>
        </div>

        <div class="card p-6">
            <h2 class="text-xl font-bold mb-6">Sign In</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="toast-error">⚠️ {{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-2" style="color: var(--text-muted); letter-spacing: 0.08em; font-family: 'Syne', sans-serif;">USERNAME</label>
                    <input type="text" name="username" required placeholder="Enter your username" class="input-field" autocomplete="username">
                </div>
                <div class="mb-6">
                    <label class="block text-xs font-semibold mb-2" style="color: var(--text-muted); letter-spacing: 0.08em; font-family: 'Syne', sans-serif;">PASSWORD</label>
                    <div class="relative">
                        <input type="password" name="password" id="passwordField" required placeholder="Enter your password" class="input-field" style="padding-right: 48px;" autocomplete="current-password">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2" style="color: var(--text-muted); background: none; border: none; cursor: pointer;">
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign In →</button>
            </form>
        </div>
    </div>
    <script>
        function togglePassword() {
            const f = document.getElementById('passwordField');
            f.type = f.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
